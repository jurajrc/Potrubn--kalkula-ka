<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Výpočet uhla kolena</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <h2>Výpočet uhla kolena</h2>

    <label></label>
    <select id="vyber_kolena" autofocus onchange="nastavRozmery(); vypocitajRez(); vypocitaj()">
        <option value="">Vyber koleno</option>
        <option value="138,108">DN100 veľké</option>
        <option value="100,108">DN100 malé</option>
        <option value="116,90">DN90 veľké</option>
        <option value="90,90">DN90 malé</option>
    </select>

    <br><br>

    <label>Radius kolena (mm):</label>
    <input type="number" inputmode="decimal"  id="radius" oninput="vypocitaj();     vypocitajRez()" list="radius_list"><br>
    <datalist id="radius_list">
        <option value="138">
        <option value="105">
    </datalist>

    <label>Priemer potrubia (mm)</label>
        <input type="number" id="priemer" oninput="vypocitajRez()" list="priemer_list"><br>
        <datalist id="priemer_list">
            <option value="108">
            <option value="90">
        </datalist>

    <label>Odskok dvoch kolien</label>
    <input type="number" id="odskok" oninput="vypocitaj(); vypocitajRez()"><br>

    <article hidden>
        <label>Uhol:</label>
        <input type="text" id="uhol" readonly><br>
    </article>

    <p id="uholl">Uhol bude:</p>

    <p id="chyba"></p>


    <p id="miesto_rezu">Miesto rezu:</p>

    <script 
        src="script.js" >
    </script>

</body>
</html>
