<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Výpočet uhla kolena</title>
    <style>
        body { font-family: Arial; }
        input { margin: 5px; padding: 5px; }
        #chyba { color: red; }
    </style>
</head>
<body>

<h2>Výpočet uhla kolena</h2>

<label>Radius (r):</label>
<input type="number" inputmode="decimal" step="0.1" autofocus id="radius" oninput="vypocitaj(); vypocitajRez()" list="radius_list"><br>
<datalist id="radius_list">
    <option value="138">
    <option value="105">
</datalist>

<label>Odskok:</label>
<input type="number" id="odskok" oninput="vypocitaj(); vypocitajRez()"><br>

<label>Uhol:</label>
<input type="text" id="uhol" readonly><br>

<p id="chyba"></p>

<label>Priemer potrubia (mm)</label>
<input type="number" id="priemer" oninput="vypocitajRez()" list="priemer_list"><br>
<datalist id="priemer_list">
    <option value="108">
    <option value="90">
</datalist>

<p id="miesto_rezu"></p>

<script>
function vypocitaj() {
    let r = parseFloat(document.getElementById("radius").value);
    let o = parseFloat(document.getElementById("odskok").value);
    let chyba = document.getElementById("chyba");
    let uholInput = document.getElementById("uhol");
    let max = 2 * r;

    chyba.innerText = "";
    uholInput.value = "";

    // Kontrola vstupov
    if (!r || !o) {
        return;
    }

    if (r <= 0 || o <= 0) {
        chyba.innerText = "Hodnoty musia byť väčšie ako 0";
        return;
    }

    if (o > 2 * r) {
        chyba.innerText = "Odskok je príliš veľký, pre daný radius je max odskok " + max + " mm";
        return;
    }

    let hodnota = (r - (o / 2)) / r;

    if (hodnota < -1 || hodnota > 1) {
        chyba.innerText = "Matematická chyba (acos mimo rozsah)";
        return;
    }

    let uhol = Math.acos(hodnota);
    uhol = uhol * (180 / Math.PI);

    uholInput.value = uhol.toFixed(1) + "°";
}
function vypocitajRez() {
    // vstupy
    const D = parseFloat(document.getElementById("priemer").value);
    const r = parseFloat(document.getElementById("radius").value);
    const uhol = parseFloat(document.getElementById("uhol").value);
    let miestoRezu = document.getElementById("miesto_rezu");

    
    miestoRezu.innerText = "";

    // Kontrola vstupov
    if (!D || !r || !uhol) {
        return;
    }

    // premena stupňov na radiány
    const uholRad = (uhol * Math.PI) / 180;

    // výpočet
    const a = r - (D / 2);
    const c = Math.sqrt(2 * a * a * (1 - Math.cos(uholRad)));

    // výpis do konzole
    //console.log(c);
    //console.log(uhol);
    //console.log(a);
    // výstup
    miestoRezu.innerText ="rez je " + c.toFixed(1) + " mm od okraja kolena";

    if (navigator.vibrate) {
        navigator.vibrate(100);
    }
}
</script>

</body>
</html>
