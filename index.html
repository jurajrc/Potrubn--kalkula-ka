<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Výpočet uhla kolena</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <h2>Výpočet uhla kolena</h2>

    <article class="container">
    <label for="vyber_kolena">Vyber koleno:</label>
    <select id="vyber_kolena" autofocus onchange="nastavRozmery(); spustiVypocerSOneskocenim()">
        <option value="">Vyber koleno</option>
        <option value="142,108">DN100 veľké</option>
        <option value="101,108">DN100 malé</option>
        <option value="114,90">DN80 veľké</option>
        <option value="77,90">DN80 malé</option>
        <option value="76,60">DN50 veľké</option>
        <option value="51,60">DN50 malé</option>
    </select>


    <label for="radius">Radius kolena (mm):</label>
    <input type="number" inputmode="decimal"  id="radius" oninput="spustiVypocerSOneskocenim()" list="radius_list">
    <datalist id="radius_list">
        <option value="138">
        <option value="105">
    </datalist>

    <label for="priemer">Priemer potrubia (mm)</label>
        <input type="number" id="priemer" oninput="spustiVypocerSOneskocenim()" list="priemer_list">
        <datalist id="priemer_list">
            <option value="108">
            <option value="90">
        </datalist>

    <label for="odskok">Odskok dvoch kolien (mm)</label>
    <input type="number" id="odskok" oninput="spustiVypocerSOneskocenim()">

    <article hidden>
        <label for="uhol">Uhol:</label>
        <input type="text" id="uhol" readonly>
    </article>

    <p class="allert" id="chyba"></p>

    <p id="uholl">Uhol bude:</p>

    <p id="miesto_rezu">Miesto rezu:</p>

    </article>

    <script 
        src="script.js" >
    </script>

</body>
</html>
